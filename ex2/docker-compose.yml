services:
  mongo:
    build:
      context: .
      dockerfile: Dockerfile.mongo
    container_name: readinglist-mongo
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
    container_name: readinglist-api
    environment:
      - MONGO_URL=mongodb://mongo:27017/readinglist
      - PORT=19020
    ports:
      - "19020:19020"
    depends_on:
      - mongo

  web:
    image: nginx:1.27-alpine
    container_name: readinglist-web
    ports:
      - "19021:80"
    volumes:
      - ../index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  mongo-data:
